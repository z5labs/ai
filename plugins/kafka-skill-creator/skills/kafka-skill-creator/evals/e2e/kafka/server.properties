# Single-node KRaft broker with SASL_PLAINTEXT (SCRAM-SHA-512) on the
# client listener. The controller listener stays PLAINTEXT — it's only
# used by the broker process talking to itself in single-node mode and
# is never exposed outside the container.
#
# This file is mounted read-only into apache/kafka:3.9.0 by docker-compose.

process.roles=broker,controller
node.id=1
controller.quorum.voters=1@localhost:9093

# One client listener, one controller listener. CONTROLLER binds on
# localhost (not 0.0.0.0) because it's only used by the broker process
# connecting to itself in single-node mode — and Kafka rejects
# advertised.listeners containing 0.0.0.0, which it auto-derives from
# `listeners` for any listener not explicitly advertised.
listeners=SASL_PLAINTEXT://0.0.0.0:9092,CONTROLLER://localhost:9093
# Advertise localhost so callers on the host (kafkactl --network=host,
# Karapace running with network_mode: host) reach the broker the same way.
advertised.listeners=SASL_PLAINTEXT://localhost:9092
listener.security.protocol.map=SASL_PLAINTEXT:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT
inter.broker.listener.name=SASL_PLAINTEXT
controller.listener.names=CONTROLLER

sasl.enabled.mechanisms=SCRAM-SHA-512
sasl.mechanism.inter.broker.protocol=SCRAM-SHA-512

# Inter-broker credentials. The broker connects to itself as `admin`,
# whose SCRAM credential is provisioned by `kafka-storage format
# --add-scram` in start.sh — this JAAS only specifies which credential
# to use, not what its hash is.
listener.name.sasl_plaintext.scram-sha-512.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="admin" password="admin-secret";

# We don't enable an authorizer, so no ACL setup is needed — both `admin`
# and `app` can do everything once authenticated. super.users is a
# belt-and-braces declaration in case a future change turns one on.
super.users=User:admin

log.dirs=/tmp/kraft-combined-logs
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1
default.replication.factor=1
min.insync.replicas=1
group.initial.rebalance.delay.ms=0
